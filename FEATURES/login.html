<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="favicon.svg">
    <link rel="shortcut icon" href="favicon.png">

    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: url('images/login.jpg');
            background-size: cover;
            background-position: center;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px -10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 370px;
            padding: 10px;
            margin: 10px 10px 10px -10px;
            background-color: hsl(223, 85%, 21%);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-family: Sora, sans-serif;
            text-transform: uppercase;
        }

            button:hover {
                background-color: #0056b3;
            }

        .error {
            color: red;
            margin-top: 10px;
        }


        .myh2 {
            font-family: Sora, sans-serif;
            font-weight: 700;
            color: hsl(223.15deg 84.76% 20.59%);
        }
    </style>
</head>
<body>

    <p style="background-image: url('images\login.jpg');">

        <div class="login-container">
            <h2 class="myh2">DONATONI CONTENT</h2>
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button id="loginBtn" onclick="authenticate()">LOGIN</button>
            <div id="error-message" class="error"></div>
        </div>

        <script>
            // Quando l'utente preme Invio
            document.addEventListener("keydown", function (event) {
                if (event.key === "Enter") {
                    document.getElementById("loginBtn").click();  // Simula il click sul bottone
                }
            });
        </script>


        <script>

            function authenticate() {
                // Get input values
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                const token = 'Donatoni2026!';
                let text = 'False';
                // Clear any previous error message
                const errorMessage = document.getElementById('error-message');
                errorMessage.textContent = '';

                if (password == token) {
                    text = 'True';
                }

                if (text == "True") {
                    sessionStorage.setItem("isLoggedIn", "true");

                    const targetPage = sessionStorage.getItem("pageName");
                    const redirectTo = targetPage && targetPage.trim() !== "" ? targetPage : "index.html";

                    setTimeout(function () {
                        window.location.href = redirectTo;
                    }, 1000);
                }
                else {
                    errorMessage.textContent = 'Username o password non validi';
                    console.log(`text ricevuto: [${text}]`);
                }
            }
        </script>

</body>
</html>
