<body>
    <header class="header-main">

                       id="sidebar-toggle"
                       for="sidebar-toggle-anchor"

    </header>
    <div id="body-container">
        <input type="checkbox" id="sidebar-toggle-anchor" class="hidden" />
        <!-- Work around some values being stored in localStorage wrapped in quotes -->
        <script>
            try {
                let theme = localStorage.getItem("mdbook-theme");
                let sidebar = localStorage.getItem("mdbook-sidebar");

                if (theme.startsWith('"') && theme.endsWith('"')) {
                    localStorage.setItem(
                        "mdbook-theme",
                        theme.slice(1, theme.length - 1)
                    );
                }

                if (sidebar.startsWith('"') && sidebar.endsWith('"')) {
                    localStorage.setItem(
                        "mdbook-sidebar",
                        sidebar.slice(1, sidebar.length - 1)
                    );
                }
            } catch (e) { }
        </script>

        <!-- Set the theme before any content is loaded, prevents flash -->
        <script>
            const default_theme = window.matchMedia("(prefers-color-scheme: dark)")
                .matches
                ? default_dark_theme
                : default_light_theme;
            let theme;
            try {
                theme = localStorage.getItem("mdbook-theme");
            } catch (e) { }
            if (theme === null || theme === undefined) {
                theme = default_theme;
            }
            const html = document.documentElement;
            html.classList.remove("light");
            html.classList.add(theme);
            html.classList.add("js");
        </script>

 

        <nav id="sidebar" class="sidebar" aria-label="Table of contents">

                <!-- Apply ARIA attributes after the sidebar and the sidebar toggle button are added to the DOM -->
                <script>
                    document
                        .getElementById("sidebar-toggle")
                        .setAttribute("aria-expanded", sidebar === "visible");
                    document
                        .getElementById("sidebar")
                        .setAttribute("aria-hidden", sidebar !== "visible");
                    Array.from(document.querySelectorAll("#sidebar a")).forEach(
                        function (link) {
                            link.setAttribute("tabIndex", sidebar === "visible" ? 0 : -1);
                        }
                    );
                </script>

<script>
    const params = new URLSearchParams(window.location.search);
    const title = params.get("title");
    let src = params.get("src");

    const h1 = document.querySelector("main h1");
    const a = h1.querySelector("a.header");
    const iframe = document.querySelector("main iframe");

    // --- Aggiorna titolo ---
    if (title) {
        const cleanId = title.toLowerCase().replace(/\s+/g, '-');
        h1.id = cleanId;
        a.href = `#${cleanId}`;
        a.textContent = title;
        document.title = title;
    }

    // --- Aggiorna iframe src ---
    if (src) {
	
	      // Aggiunge autoplay solo se non già presente
        if (src.includes("youtube.com/embed") && !/[?&]autoplay=1/.test(src)) {
            src += (src.includes("?") ? "&" : "?") + "autoplay=1";
        }

        iframe.src = src;
    }

    // --- Imposta permessi ---
    iframe.setAttribute("allow", "autoplay; encrypted-media; fullscreen; picture-in-picture");
	
              localStorage.setItem(
                        "mdbook-sidebar",
                        0
                    );
						
</script>
