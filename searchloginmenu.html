    <script>


        async function fetchToken(parametro1) {
            try {
                const response = await fetch(`http://192.168.6.14:8081/api/evaluate?token=${encodeURIComponent(parametro1)}`);
                if (!response.ok) throw new Error("Errore nella risposta HTTP");

                const text = await response.json(); // supponiamo risponda con "True" o "False"
                if (text == "True") {
                    console.info("login ok");
                    sessionStorage.setItem("isLoggedIn", "true");
                    return true;
                } else {
                    console.info("login KO");
                    return false;
                }
            } catch (error) {
                console.error("Errore durante la fetch:", error);
                return false;
            }
        }



        document.addEventListener("DOMContentLoaded", async () => {
            const fragment = window.location.hash.substring(1); // Prende il valore dopo #
            const [parametro1, parametro2, parametro3] = fragment.split("|"); // Divide i valori
            const output = document.getElementById("parametro");
            const outputh = document.getElementById("erroreerror");
            const HIDEMENU = "H";

            if (!parametro1) {
                output.textContent = "No token found";
                outputh.textContent = "Errore/Error";
                return;
            }

            const loginOk = await fetchToken(parametro1); // aspetta la fetch

            if (!loginOk) {
                output.textContent = "Invalid token";
                outputh.textContent = "Errore/Error";
                return;
            }

            if (!parametro2) {
                output.textContent = "No label found";
                outputh.textContent = "Errore/Error";
                return;
            }

            if (parametro3 == HIDEMENU) {
                localStorage.setItem("mdbook-sidebar", "hidden");
                sessionStorage.setItem("hideMenu", "true");
            }
            else {
                sessionStorage.setItem("hideMenu", "false");
            }


            output.textContent = `Parametro passato: ${parametro2}`;
            
            // Cerca tutte le corrispondenze nel body
            const mappings = document.querySelectorAll("p#mapping");
            for (const mapping of mappings) {
                const [key, value] = mapping.textContent.split("=");
                if (key === parametro2) {
                    window.location.href = value.trim(); // Reindirizza l'utente alla pagina corrispondente
                    return;
                }
            }

            outputh.textContent = "Errore/Error";

            var msg = `Page not found: ${parametro2}`;

            alert(msg);
        });
    </script>
    <style>
